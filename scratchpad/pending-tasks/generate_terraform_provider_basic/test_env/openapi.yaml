openapi: 3.1.0
info:
  title: Petstore API
  version: 1.0.0
servers:
  - url: http://api.petstore.com/v1
paths:
  /pet:
    post:
      summary: Add a new pet to the store
      operationId: addPet
      x-speakeasy-entity-operation: Pet#create
      requestBody:
        description: Pet object that needs to be added to the store
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pet'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
  /pet/{petId}:
    get:
      summary: Find pet by ID
      operationId: getPetById
      x-speakeasy-entity-operation: Pet#read
      parameters:
        - name: petId
          in: path
          description: ID of pet to return
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
components:
  schemas:
    Pet:
      x-speakeasy-entity: Pet
      type: object
      required:
        - name
        - photoUrls
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: doggie
        photoUrls:
          type: array
          items:
            type: string
